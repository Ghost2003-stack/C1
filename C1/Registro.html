<!DOCTYPE html>
<html lang="es">
<head>
    <link type="image/x-icon" rel="shortcut icon" href="Imagenes/Gymrat.ico" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulario de registro seguro para nuevos usuarios de Suplementos Gym Pro.">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:;">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="css/estiloRegistro.css">
</head>
<body>
    <a class="skip-link" href="#registroForm">Saltar al formulario</a>
    <main>
        <form id="registroForm" autocomplete="off">
            <h1>Registro de Usuario</h1>
            <p class="intro">Completa tus datos para inscribirte de forma segura.</p>
            <fieldset>
                <legend>Información personal</legend>
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre Completo"
                           required maxlength="50" pattern="[A-Za-zÀ-ÿ\s'-]+"
                           autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="Correo Electrónico"
                           required maxlength="254" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Contraseña"
                           required minlength="8" maxlength="128" autocomplete="new-password">
                </div>
               <div class="form-group">
                    <label for="password">Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmar contraseña"
                           required minlength="8" maxlength="128" autocomplete="new-password">
                </div>
            </fieldset>
            <button type="submit">Registrarse</button>
            <p id="mensaje" class="form-message" role="status" aria-live="polite"></p>
        </form>
    </main>
    <script src="Js/app.js"></script>
</body>
</html>
